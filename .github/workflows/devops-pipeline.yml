name: DevOps CI/CD Pipeline

# 触发条件：只要有人往 main 分支推代码，就启动流水线
on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # 在 GitHub 提供的一台免费 Linux 机器上运行

    steps:
      - name: 1. 拉取最新代码
        uses: actions/checkout@v4

      - name: 2. 准备 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 3. 安装依赖 (类似厨房准备食材)
        run: pip install -r requirements.txt

      - name: 4. 自动化测试 (金牌质检员出场)
        run: pytest test_app.py

      - name: 5. 构建 Docker 镜像 (打包进集装箱)
        run: |
          docker build -t my-devops-app:latest .
          echo "恭喜！Docker 镜像构建成功！"